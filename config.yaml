timezone: US/Eastern
app:
  version: 0.1.0
  update_url: ''
  auto_check_updates: false
portfolio:
  initial_cash: 100000
broker:
  mode: paper
  enable_live_trading: false
  slippage_bps: 1.0
  commission_per_share: 0.0
  commission_per_contract: 2.0
risk:
  risk_per_trade: 0.005
  max_dollar_risk_per_trade: 1000
  max_daily_loss_pct: 0.02
  max_consecutive_losses: 3
  max_open_positions: 5
  max_leverage: 2.0
  max_order_qty: 10000
  max_stop_pct: 0.05
  circuit_breaker_atr_pct: 0.05
  max_api_errors: 5
  pyramid_add_fraction: 0.5
webhook:
  auth_required: true
  secret_env: VELEZ_WEBHOOK_SECRET
  execute_orders: true
  paper_only: true
  time_in_force: day
  take_profit_r: null
  dedupe_cache_size: 1000
w_shape:
  enabled: true
  decline_bars: 2
  recovery_pct: 0.5
  w_tolerance: 0.002
deceleration:
  enabled: true
  lookback: 5
  body_shrink_ratio: 0.7
three_bar_play:
  enabled: true
pocket_pivot:
  enabled: true
give_me_a_c:
  enabled: true
stacking:
  enabled: true
  lookback: 20
  gap_bars: 5
wick_counting:
  enabled: true
  min_consecutive: 2
  lookback: 8
  wick_threshold: 0.5
post_elephant_pullback:
  enabled: true
  max_pullback_bars: 10
volume_climax:
  enabled: true
  lookback: 20
  climax_mult: 2.5
mtf_alignment_scoring:
  enabled: true
strategy:
  sma_fast: 20
  sma_slow: 200
  atr_period: 14
  slope_lookback: 20
  ema_power: false
  ema_power_window: 9
  narrow_threshold: 0.004
  wide_threshold: 0.008
  narrow_bars: 10
  breakout_atr_mult: 1.5
  swing_lookback: 20
  breakout_mode: either
  momentum_atr_mult: 0.5
  elephant:
    enabled: false
    range_atr_mult: 1.5
    close_pos_pct: 0.7
  entry:
    use_limit: false
  exits:
    stop_type: atr
    stop_atr_mult: 2.0
    trail_type: atr
    trail_atr_mult: 2.5
    trail_debounce: 2
    partials:
      enabled: true
      first_r: 1.0
      second_r: 2.0
      first_pct: 0.5
      second_pct: 0.25
      move_stop_to_breakeven: true
    time_stop:
      enabled: true
      bars: 30
      min_move_atr: 1.0
velez_strategy:
  sma_fast: 20
  sma_slow: 200
  atr_period: 14
  slope_lookback: 5
  history_bars: 240
  near_sma_pct: 0.0025
  near_sma_atr_mult: 0.35
  extended_sma_pct: 0.012
  extended_sma_atr_mult: 1.0
  slope_tolerance: 1.0e-09
  tick_size:
    default: 0.01
  entry:
    no_chase_body_pct: 0.05
  elephant:
    enabled: true
    body_lookback: 5
    structure_lookback: 5
    min_body_mult: 1.8
    max_each_wick_pct: 0.2
    max_total_wick_pct: 0.35
    climactic_body_mult: 3.0
    climactic_atr_mult: 2.2
  one_eighty:
    enabled: true
    recover_pct: 0.8
  tail:
    enabled: true
    min_tail_pct: 0.66
    trend_bars: 3
    prefer_tail_limit: true
